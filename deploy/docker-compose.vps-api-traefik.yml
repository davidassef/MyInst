# ============================================================================
# MyInst — VPS API with Traefik (proxy + TLS automático)
# Uso:
# 1) docker compose --env-file deploy/.env.production.example -f deploy/docker-compose.shared-infra.yml up -d
# 2) MYINST_COMPOSE_FILE=deploy/docker-compose.vps-api-traefik.yml MYINST_ENV_FILE=deploy/.env.production.example pnpm db:deploy:schema
# 3) docker compose --env-file deploy/.env.production.example -f deploy/docker-compose.vps-api-traefik.yml up -d --build
# ============================================================================ 

name: myinst-vps-api

services:
  myinst-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: myinst-api:latest
    container_name: myinst-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "postgresql://${DB_USER:-myinst_user}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/myinst"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      APP_URL: "${APP_URL:?APP_URL is required}"
      API_PUBLIC_URL: "${API_PUBLIC_URL:?API_PUBLIC_URL is required}"
      CORS_ORIGIN: "${CORS_ORIGIN:?CORS_ORIGIN is required}"
      WEB_OAUTH_SUCCESS_URL: "${WEB_OAUTH_SUCCESS_URL:?WEB_OAUTH_SUCCESS_URL is required}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      OAUTH_CALLBACK_URL: "${OAUTH_CALLBACK_URL:?OAUTH_CALLBACK_URL is required}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared-infra-net
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.myinst-api.rule=Host(`${MYINST_API_HOST:?MYINST_API_HOST is required}`)
      - traefik.http.routers.myinst-api.entrypoints=websecure
      - traefik.http.routers.myinst-api.tls=true
      - traefik.http.routers.myinst-api.tls.certresolver=letsencrypt
      - traefik.http.services.myinst-api.loadbalancer.server.port=3000

networks:
  shared-infra-net:
    external: true
    name: shared-infra-net
  traefik-public:
    external: true
    name: traefik-public
